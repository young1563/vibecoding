<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZIB: 회로 복구</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: var(--bg-dark);
        }

        #nonogramScreen {
            opacity: 1;
            pointer-events: all;
            transform: none;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- Global Nav -->
        <nav class="main-nav">
            <div class="logo-section">
                <a href="index.html"
                    style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px;">
                    <div class="logo-icon">ZPD</div>
                    <div class="logo-text">
                        <h1>주토피아 수사국</h1>
                        <span>Case Hub</span>
                    </div>
                </a>
            </div>
            <div class="hud-pills">
                <div class="pill">
                    <i class="fas fa-star"></i>
                    <span id="appStars">0</span>
                </div>
            </div>
        </nav>

        <section id="nonogramScreen" class="gameplay-screen">
            <header class="game-top-bar">
                <a href="index.html" class="back-btn" style="text-decoration: none;">
                    <i class="fas fa-arrow-left"></i> 본부로
                </a>
                <div class="logo-text">
                    <h1 style="font-size: 1rem; color: white;">회로 복구 진행중</h1>
                </div>
                <button class="pill" id="resetBtn" data-tooltip="기판의 모든 시스템을 초기 상태로 되돌립니다.">
                    <i class="fas fa-sync"></i>
                    <div class="pill-info">
                        <span class="pill-label">시스템 리셋</span>
                        <span class="pill-val">RELOAD</span>
                    </div>
                </button>
            </header>

            <div class="lab-layout" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <div class="puzzle-core"
                    style="flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 40px;">
                    <div class="grid-wrapper">
                        <div id="colHints" class="hint-col"></div>
                        <div id="rowHints" class="hint-row"></div>
                        <div id="mainGrid" class="grid-container"></div>
                    </div>
                </div>

                <div class="inventory-bar"
                    style="height: 151px; background: rgba(0,0,0,0.5); padding: 10px; display: flex; gap: 10px; overflow-x: auto;">
                    <div id="blockList" style="display: flex; gap: 10px;"></div>
                </div>
            </div>

            <!-- Win Overlay -->
            <div id="winOverlay" style="display:none;">
                <div class="win-content">
                    <h1>REPAIRED</h1>
                    <button class="launch-btn" id="nextLevelBtn">다음 레벨</button>
                    <a href="index.html" class="launch-btn" style="text-decoration: none; margin-top: 10px;">본부 복귀</a>
                </div>
            </div>
        </section>

        <div id="ghostBlock"></div>
    </div>

    <script src="platform-manager.js"></script>
    <script src="nonogram-logic.js"></script>
    <script>
        window.addEventListener('load', () => {
            if (!window.nonogramGame) window.nonogramGame = new NonogramGame(window.platform);
            window.nonogramGame.init();
        });
    </script>
</body>

</html>
