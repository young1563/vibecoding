<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZIB: 주토피아 수사국</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <!-- New Navigation -->
        <nav class="main-nav">
            <div class="logo-section">
                <div class="logo-icon">ZPD</div>
                <div class="logo-text">
                    <h1>주토피아 수사국</h1>
                    <span>Case Hub</span>
                </div>
            </div>
            <div class="hud-pills">
                <div class="pill">
                    <i class="fas fa-star"></i>
                    <span id="appStars">1,250</span>
                </div>
            </div>
        </nav>

        <!-- Home Screen -->
        <main id="homeScreen" class="screen active" style="overflow-y: auto;">
            <div class="hero-scroll">
                <div class="welcome-msg animate-in">
                    <h2>오늘의 미제 사건들</h2>
                    <p style="color: #64748B;">준비된 수사관님, 사건 현장을 선택해 주세요.</p>
                </div>

                <div class="game-grid">
                    <!-- Mahjong Card -->
                    <a href="mahjong.html" class="game-card mahjong animate-in"
                        style="animation-delay: 0.1s; text-decoration: none; color: inherit;">
                        <div class="visual">🀄</div>
                        <div class="game-info">
                            <h3>마작 마스터: 도심 수사</h3>
                            <p>단서 타일들을 짝지어 사라진 증거를 확보하세요.</p>
                            <span class="launch-btn">수사 시작 <i class="fas fa-chevron-right"></i></span>
                        </div>
                    </a>

                    <!-- Nonogram Card -->
                    <a href="nonogram.html" class="game-card nonogram animate-in"
                        style="animation-delay: 0.2s; text-decoration: none; color: inherit;">
                        <div class="visual">🧩</div>
                        <div class="game-info">
                            <h3>회로 복구 모듈</h3>
                            <p>숫자 힌트를 이용해 끊어진 통신망을 수리하세요.</p>
                            <span class="launch-btn">모듈 작동 <i class="fas fa-chevron-right"></i></span>
                    </a>
                </div>
            </div>
    </div>
    </main>
    </div>

    <!-- Scripts -->
    <script src="platform-manager.js"></script>
</body>

</html>
